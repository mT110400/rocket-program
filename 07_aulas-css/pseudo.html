<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: pink;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .box {
            background-color: rgba(128, 0, 128, 1);
            width: 50px;
            height: 50px;
            box-shadow: 4px 4px 4px 0px rgba(0, 0, 0);
            transition: all 0.3s;
        }

        .box:hover {
            transform: scale(1.5);
            background-color: rgba(238, 130, 238);

        }

        .box:active {
            box-shadow: 4px 4px 4px 0px inset rgba(0, 0, 0);
        }

        input:focus {
            color: palevioletred
        }

        /* 
        .box:nth-child(1) {
            /* background-color: darkviolet; */
        /* }

        .box:not(.special) {
            background-color: darkviolet;
        } */


        .quote::before {
            content: open-quote;
        }

        .quote::after {
            content: close-quote
        }

        .speak {
            border-radius: 50%;
            padding: 16px;
            position: relative;
            box-shadow: none;
        }

        .speak::before {
            content: '';
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: -2;
            box-shadow: 4px 4px 4px 0px rgba(0, 0, 0);
        }

        .speak::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: purple;
            bottom: 0;
            right: 0;
            z-index: -1;
            transform: rotate(20deg) translate(-5px, -7px) skew(45deg);
            box-shadow: 4px 4px 4px 0px rgba(0, 0, 0);
            transition: all 0.3s;
        }

        .speak:hover::after {
            background: violet;
        }

        .line::first-line {
            background-color: darkviolet;
        }

        .letter {
            width: 100px;
        }

        .letter::first-letter {
            color: darkviolet;
            font-size: 40px;
        }

        ::selection {
            background-color: palevioletred;
            color: blueviolet;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg) scale(0.5);
            }

            50% {
                transform: rotate(180deg) scale(1);
            }

            100% {
                transform: rotate(360deg) scale(0.5);
            }
        }

        @keyframes color {
            0% {
                background-color: deeppink;
            }

            100% {
                background-color: purple;
            }
        }

        .box {
            animation: rotate 2s infinite linear, color 1s infinite linear alternate;
        }
    </style>

</head>

<body>
    <div class="box quote">Olá mundo</div>
    <div class="box speak">Olá mundo</div>
    <div class="box line">Olá mundo</div>
    <div class="box letter">Olá mundo</div>
</body>

</html>
