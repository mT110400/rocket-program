<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transform</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        background-color: coral;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
      }

      .box {
        background: darkcyan;
        width: 50px;
        height: 50px;
        box-shadow: 4px 4px 4px 0px rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.3s;
      }

      .box:hover {
        background: rgb(139, 23, 0);
        transform: scale(1.5);
      }
      .box:active {
        box-shadow: 4px 4px 4px 0px inset rgba(0, 0, 0, 0.5);
      }

      input:focus {
        color: brown;
      }

      /* .box:nth-child(3) {
  background-color: darkgoldenrod;
} */

      .box:first-child {
        background-color: darkgoldenrod;
      }
      .quote::before {
        content: open-quote;
      }
      .quote::after {
        content: close-quote;
      }

      .speak {
        border-radius: 50%;
        padding: 16px;
        position: relative;
        box-shadow: none;
      }

      .speak::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        z-index: -1;
        box-shadow: 4px 4px 4px 0px inset rgba(0, 0, 0, 0.5);
      }

      .speak:hover::after {
        background: brown;
      }

      .speak::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background: darkcyan;
        bottom: 0;
        right: 0;
        z-index: -1;
        transform: rotate(20deg) translate(-5px, -6px) skew(45deg);
        transition: all 0.3s;
      }

      .line::first-line {
        background-color: darkgoldenrod;
      }

      .letter::first-letter {
        color: brown;
        font-size: 40px;
      }

      ::selection {
        background: yellow;
        color: blue;
      }

      @keyframes rotate {
        0% {
          transform: rotate(0deg) scale(0.5);
        }
        50% {
          transform: rotate(180deg) scale(1);
        }
        100% {
          transform: rotate(360deg) scale(0.5);
        }
      }

      @keyframes color {
        0% {
          background: darkcyan;
        }
        100% {
          background: darkgoldenrod;
        }
      }

      .box {
        animation:
          rotate 2s infinite linear,
          color 1s infinite linear alternate;
      }
    </style>
  </head>
  <body>
    <div class="box quote">Olá</div>
    <div class="box speak">Mundo</div>
    <div class="box line">Olá</div>
    <div class="box letter">Mundo</div>
  </body>
</html>
