<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato cafeteria</title>
  </head>

  <body>
    <h1>Contato cafeteria</h1>
    <form>
      <label for="nome">Nome</label><br />
      <input
        type="text"
        id="nome"
        name="nome"
        placeholder="Digite seu nome"
        required
      /><br /><br />

      <label for="email">E-mail</label><br />
      <input
        type="text"
        id="email"
        name="email"
        placeholder="Digite seu e-mail"
        required
      /><br /><br />

      <label for="telefone">Telefone</label><br>
      <input type="text" name="telefone" id="telefone" placeholder="Digite seu número" required><br><br>

      <label for="assunto">Assunto</label><br>
      <input type="text" name="assunto" id="assunto" placeholder="Assunto" required><br><br>

      <label for="mensagem">Mensagem</label><br>
      <textarea name="mensagem" id="mensagen" placeholder="Escreva sua mensagem para nós!" required></textarea><br><br>

      <input type="submit" value="Enviar">
      
    </form>
    <p>
        <a href="./index.html">Cardápio</a>
    </p>
    <p>
        <a href="../index.html">Voltar ao portifólio</a>
    </p>
</body>
  </body>
</html>
