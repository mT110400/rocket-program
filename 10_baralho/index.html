<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baralho</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
    <div class="card">
  <div class="card-inner">
    <div class="card-front">
      <div class="corner top-left">
        <span class="rank">A</span>
        <img src="./assets/images/img.png" alt="Paus" class="suit">
      </div>
      <div class="center">
        <img src="./assets/images/jjk.png" alt="Paus" class="suit-large">
      </div>
      <div class="corner bottom-right">
        <span class="rank">A</span>
        <img src="./assets/images/img.png" alt="Paus" class="suit rotate">
      </div>
    </div>

    <div class="card-back">
      <img src="./assets/images/verso.png" alt="verso da carta">
    </div>
  </div>
</div>

</body>
</html>
