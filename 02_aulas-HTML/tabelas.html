<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <h1>TABELAS</h1>    
    <table border="1px" cellSpacing="0" cellpadding="8px">
        <thead>
            <tr>
                <th colspan="4">MÊS</th>
                <th rowspan="2">TOTAL</th>
            </tr>
            <tr>
                <th>JANEIRO</th>
                <th>FEVEREIRO</th>
                <th>MARÇO</th>
                <th>ABRIL</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>R$ 500</td>
                <td>R$ 200</td>
                <td>R$ 600</td>
                <td>R$ 300</td>
                <td rowspan="3">R$ 3.200,00</td>
            </tr>
            <tr>
                <td>R$ 200</td>
                <td>R$ 500</td>
                <td>R$ 300</td>
                <td>R$ 600</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
