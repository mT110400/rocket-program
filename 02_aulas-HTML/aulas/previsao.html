<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/previsao.css">


</head>

<body>
    <section class="card">
        <img class="icon" src="https://openweathermap.org/img/wn/04d@4x.png" alt="clouds" />
        <h2>18°</h2>
        <p class="feels-like">Sensação térmica de <span>18</span>°</p>
        <div class="min-max">
            <p>Mín: <span class="min">17</span>°</p>
            <p>Máx: <span class="max">19</span>°</p>
        </div>
        <p class="humidity">Umidade <span>94</span>%</p>
        <div class="wind">
            <img src="./assets/images/arrow.png" alt="Uma seta que representa a direção do vento." />

            <p>
                Velocidade do vento:
                <span>2,43</span>m/s
            </p>

        </div>
    </section>
    <section class="input">
        <input type="text" placeholder="Busque uma cidade">
        <button type="button">Buscar</button>
    </section>

    <script src="./assets/previsao.js"></script>

</body>

</html>
